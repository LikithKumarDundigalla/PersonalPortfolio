<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Likith Kumar Dundigalla | Data Engineer & AI/ML Engineer | Chicago, IL{% endblock %}</title>

    <!-- SEO Meta Tags -->

    <meta name="keywords" content="Data Engineer Chicago, AI ML Engineer, Machine Learning Engineer portfolio, Data Scientist Chicago, Databricks Snowflake engineer, RAG LLM engineer, Likith Kumar Dundigalla">
    <meta name="author" content="Likith Kumar Dundigalla">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://likithkumardundigalla.com/">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Likith Kumar Dundigalla | Data Engineer & AI/ML Engineer">
    <meta property="og:description" content="4+ years building data infrastructure and AI systems. Currently at WorldPac (Databricks + Snowflake). M.S. Data Science, U of Arizona (3.88 GPA).">
    <meta property="og:image" content="/static/images/pic.jpg">
    <meta property="og:url" content="https://likithkumardundigalla.com/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Likith Kumar Dundigalla | Data Engineer & AI/ML Engineer">
    <meta name="twitter:description" content="4+ years building data infrastructure and AI systems across healthcare, fintech & edtech.">

    <!-- Accessibility -->

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body>
    <div class="page-wrapper">
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top" aria-label="Main navigation">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('home') }}" aria-label="Home">
                    <span class="logo-text">Likith Kumar D</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link" href="#about">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#skills">Skills</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#education">Education</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#experience">Experience</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#projects">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#contact">Contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary ms-3" href="LikithKumarDundigalla_DataScience_Resume.pdf"
                                target="_blank" aria-label="Download resume">
                                <i class="fas fa-download me-2"></i>Resume
                            </a>
                        </li>
                        <li class="nav-item ms-2">
                            <button class="btn btn-outline-light theme-toggle" id="theme-toggle"
                                aria-label="Toggle light/dark mode">
                                <i class="fas fa-moon" id="dark-icon"></i>
                                <i class="fas fa-sun d-none" id="light-icon"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container py-5 mt-5" id="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer mt-5 py-4">
            <div class="container text-center">
                <p class="mb-1">&copy; 2026 Likith Kumar Dundigalla. All rights reserved.</p>
                <p class="text-muted small mb-2">Data Engineer &amp; AI/ML Engineer &middot; Chicago, IL</p>
                <div class="social-links mt-2">
                    <a href="https://github.com/LikithKumarDundigalla" target="_blank" aria-label="GitHub profile">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://linkedin.com/in/likithkumardundigalla-data-ai" target="_blank" aria-label="LinkedIn profile">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="mailto:likithkumar.dundigalla04@gmail.com" aria-label="Email">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Theme toggle with localStorage persistence
            const themeToggle = document.getElementById('theme-toggle');
            const darkIcon = document.getElementById('dark-icon');
            const lightIcon = document.getElementById('light-icon');
            const htmlElement = document.documentElement;

            const savedTheme = localStorage.getItem('theme') || 'dark';
            htmlElement.setAttribute('data-bs-theme', savedTheme);
            if (savedTheme === 'light') {
                darkIcon.classList.add('d-none');
                lightIcon.classList.remove('d-none');
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', function () {
                    const current = htmlElement.getAttribute('data-bs-theme');
                    const next = current === 'dark' ? 'light' : 'dark';
                    htmlElement.setAttribute('data-bs-theme', next);
                    localStorage.setItem('theme', next);
                    darkIcon.classList.toggle('d-none', next === 'light');
                    lightIcon.classList.toggle('d-none', next === 'dark');
                });
            }

            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        window.scrollTo({ top: target.offsetTop - 70, behavior: 'smooth' });
                    }
                });
            });

            // Navbar active state on scroll
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav-link[href^="#"]');
            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    if (window.scrollY >= section.offsetTop - 100) current = section.id;
                });
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === '#' + current) link.classList.add('active');
                });
            });

            // Animate elements on scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.timeline-item, .card, .skill-category-card').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
